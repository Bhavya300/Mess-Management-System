<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Order Your Meal</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="signup-container">
      <h2>ORDER MEAL</h2>

      <form id="payment-form">
        <div class="input-group">
          <label for="days">Number of Days</label>
          <input
            type="number"
            id="days"
            name="days"
            placeholder="e.g. 5"
            required
          />
        </div>

        <div class="price-display-group">
          <span class="price-label">Price per Day:</span>
          <span id="price-per-day" class="price-value">₹100</span>
        </div>

        <div id="total-amount" class="total-amount-box hidden">
          <span>Total Amount:</span>
          <span class="final-price">₹<span id="amount-value">0</span></span>
        </div>

        <button type="button" class="signup-btn" onclick="payNow()">
          Pay Now
        </button>
      </form>
    </div>

    <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
    <script>
      const pricePerDay = 100;
      let loggedInUser = { name: "", email: "" };
      fetch("/user-info")
        .then((res) => res.json())
        .then((data) => {
          loggedInUser = data;
        });

      const daysInput = document.getElementById("days");
      const totalAmountDiv = document.getElementById("total-amount");
      const amountValueSpan = document.getElementById("amount-value");

      daysInput.addEventListener("input", function () {
        const days = parseInt(this.value) || 0;
        if (days > 0) {
          amountValueSpan.textContent = days * pricePerDay;
          totalAmountDiv.classList.remove("hidden");
        } else {
          amountValueSpan.textContent = "0";
          totalAmountDiv.classList.add("hidden");
        }
      });

      async function payNow() {
        const days = parseInt(document.getElementById("days").value);
        const amount = days * pricePerDay;
        const response = await fetch("/create-order", {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
          },
          body: JSON.stringify({
            amount,
            days,
          }),
        });

        const order = await response.json();

        const options = {
          key: "rzp_test_okDc7v7NsZLjjQ",
          amount: order.amount,
          currency: "INR",
          name: "Acme Corp",
          description: `Meal Booking for ${days} day(s)`,
          order_id: order.id,
          handler: function (response) {
            const days = parseInt(document.getElementById("days").value);
            fetch("/verify-payment", {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({
                razorpay_payment_id: response.razorpay_payment_id,
                razorpay_order_id: response.razorpay_order_id,
                razorpay_signature: response.razorpay_signature,
                days,
                amount: days * pricePerDay,
              }),
            })
              .then(async (res) => {
                const data = await res.json();
                console.log("Verify payment response:", data);

                if (data.success) {
                  if (data.booking) {
                    sessionStorage.setItem(
                      "lastBooking",
                      JSON.stringify(data.booking),
                    );
                  }
                  console.log("Redirecting...");
                  window.location.href = "bookingDetails.html";
                } else {
                  console.log("Verification failed");
                  alert(data.error || "Payment verification failed.");
                }
              })
              .catch((err) => {
                console.error("Payment verification request failed", err);
                alert("Payment verification failed.");
              });
          },
          prefill: {
            name: loggedInUser.name,
            email: loggedInUser.email,
            contact: "9999999999",
          },

          theme: {
            color: "#F37254",
          },
        };

        const rzp = new Razorpay(options);
        rzp.open();
      }
    </script>
  </body>
</html>
